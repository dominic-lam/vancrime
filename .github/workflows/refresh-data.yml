name: Refresh crime data

on:
  schedule:
    # Mondays 16:00 UTC (~08:00 PT) — VPD publishes Sunday mornings.
    - cron: "0 16 * * 1"
  workflow_dispatch: {}   # manual "Run workflow" button

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build cube from VPD feed
        run: python scripts/aggregate.py --download

      - name: Commit if data changed
        run: |
          git config user.name  "vancrime-bot"
          git config user.email "actions@users.noreply.github.com"
          # The cube's meta.generated_utc is rewritten every run, so a plain
          # `git diff` is never empty. Compare against the committed cube with
          # that timestamp stripped — commit only if the actual data changed.
          if git show HEAD:data/crime_cube.json > /tmp/old_cube.json 2>/dev/null; then
            old_sig=$(jq -S 'del(.meta.generated_utc)' /tmp/old_cube.json)
            new_sig=$(jq -S 'del(.meta.generated_utc)' data/crime_cube.json)
            if [ "$old_sig" = "$new_sig" ]; then
              echo "Only generated_utc changed — nothing meaningful to commit."
              exit 0
            fi
          fi
          git add data/crime_cube.json
          git commit -m "data: weekly refresh $(date -u +%Y-%m-%d)"
          git push
